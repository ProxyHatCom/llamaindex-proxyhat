name: Compat (llama-index-core latest)

# Autonomy watchdog: weekly (and on demand) it installs the newest llama-index-core
# and our newest proxyhat SDK, then runs the test suite against them. A red run
# means upstream shipped a breaking change — it opens/updates a tracking issue so
# we notice before users do. The proactive path is Renovate (renovate.json), which
# opens a version-bump PR that must pass this same CI before auto-merging.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Install latest upstreams
        run: pip install --upgrade llama-index-core proxyhat
      - run: pytest -v
      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Compat break: llama-index-core@latest / proxyhat@latest";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "compat",
            });
            const body = `The weekly compatibility check failed against the latest upstream releases.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["compat"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            }
